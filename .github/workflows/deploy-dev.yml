name: Deploy plugins
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Pterodactyl
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Cache do checkout para repositórios grandes
          fetch-depth: 1

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Cache automático do JDK
          cache: 'gradle'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          # Cache automático do Gradle (wrapper, dependencies, build cache)
          cache-read-only: false
          cache-write-only: false
          # Cache das dependências baixadas
          dependency-graph: generate-and-submit

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle/caches
            .gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle shadowJar
        run: ./gradlew shadowJar --build-cache --parallel --no-daemon

      - name: Upload to Pterodactyl
        uses: rexlmanu/pterodactyl-upload-action@v2.5
        with:
          panel-host: ${{ secrets.PANEL_HOST }}
          api-key: ${{ secrets.API_KEY }}
          source: "core-minecraft/build/libs/core-minecraft-0.6.1-alpha-dev-all.jar"
          server-id: dffdf5a9
          target: "./plugins/"
          # Se você quiser reiniciar os servidores após upload bem-sucedido
          # restart: true
          # Se você quiser descomprimir os arquivos após upload bem-sucedido
          # decompress-target: true

      - name: Upload to Pterodactyl Proxy
        uses: rexlmanu/pterodactyl-upload-action@v2.5
        with:
          panel-host: ${{ secrets.PANEL_HOST }}
          api-key: ${{ secrets.API_KEY }}
          source: "core-proxy/build/libs/core-proxy-0.6.1-alpha-dev-all.jar"
          server-id: c3a84b4b
          target: "./plugins/"
          # Se você quiser reiniciar os servidores após upload bem-sucedido
          # restart: true
          # Se você quiser descomprimir os arquivos após upload bem-sucedido
          # decompress-target: true
