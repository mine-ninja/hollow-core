name: Deploy plugins
on:
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy to Pterodactyl
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle shadowJar
        run: ./gradlew shadowJar

      - name: Upload to Pterodactyl
        uses: rexlmanu/pterodactyl-upload-action@v2.5
        with:
          panel-host: ${{ secrets.PANEL_HOST }}
          api-key: ${{ secrets.API_KEY }}
          source: "core-minecraft/build/libs/core-minecraft-0.6-alpha-dev-all.jar"
          server-ids:
            dffdf5a9
          target: "./plugins/"
          # Se você quiser reiniciar os servidores após upload bem-sucedido
          # restart: true
          # Se você quiser descomprimir os arquivos após upload bem-sucedido
          # decompress-target: true
